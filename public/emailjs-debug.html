<!DOCTYPE html>
<html>
<head><title>EmailJS Debug Test</title></head>
<body>
<h1>EmailJS Debug Test</h1>
<p>Open DevTools Console (F12) and click the button below.</p>
<button id="test" onclick="testEmailJS()">Test EmailJS Send</button>
<pre id="output" style="background:#111;color:#0f0;padding:20px;margin-top:20px;white-space:pre-wrap;"></pre>
<script>
async function testEmailJS() {
  const out = document.getElementById('output');
  out.textContent = 'Testing...\n';

  const payload = {
    lib_version: '4.4.1',
    service_id: 'service_i9fycyv',
    template_id: 'template_48nuksx',
    user_id: 'cZ-jx1VoveU9mLero',
    template_params: {
      name: 'Debug Test',
      email: 'debug@test.com',
      category: 'Commercial',
      budget: 'Under ₹10,000',
      timeline: '1 month',
      message: 'This is a debug test from the browser.'
    }
  };

  out.textContent += 'Payload: ' + JSON.stringify(payload, null, 2) + '\n\n';

  try {
    const response = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: { 'Content-type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const text = await response.text();
    out.textContent += 'HTTP Status: ' + response.status + ' ' + response.statusText + '\n';
    out.textContent += 'Response Body: ' + text + '\n';
    out.textContent += 'Headers:\n';
    response.headers.forEach((v, k) => {
      out.textContent += '  ' + k + ': ' + v + '\n';
    });
  } catch (err) {
    out.textContent += 'FETCH ERROR: ' + err.message + '\n';
  }
}
</script>
</body>
</html>
